  <g transform="translate(510, 200)">
    <rect width="180" height="140" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <rect x="15" y="15" width="150" height="80" rx="6" fill="rgba(139,92,246,0.3)"/>
    <rect x="15" y="105" width="100" height="10" rx="4" fill="rgba(255,255,255,0.4)"/>
    <rect x="15" y="120" width="60" height="8" rx="3" fill="rgba(255,255,255,0.2)"/>
