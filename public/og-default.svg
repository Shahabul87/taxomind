<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(255,255,255,0.05)"/>
  <circle cx="600" cy="315" r="400" fill="rgba(255,255,255,0.03)"/>

  <!-- Logo area -->
  <rect x="520" y="180" width="160" height="160" rx="32" fill="rgba(255,255,255,0.15)"/>
  <text x="600" y="310" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="white" text-anchor="middle">T</text>

  <!-- Title -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#textGrad)" text-anchor="middle">Taxomind</text>

  <!-- Tagline -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.9)" text-anchor="middle">Where Minds Are Forged Through Intelligence</text>

  <!-- Subtitle -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.7)" text-anchor="middle">AI-Powered Intelligent Learning Platform</text>
</svg>
