<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="testimonialPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.2">
        <!-- Diagonal grid -->
        <path d="M0,20 L20,0 M0,40 L40,0 M0,60 L60,0 M0,80 L80,0 M0,100 L100,0"/>
        <path d="M20,100 L100,20 M40,100 L100,40 M60,100 L100,60 M80,100 L100,80"/>
        
        <!-- Quote marks -->
        <path d="M25,25 Q20,20 25,15 Q30,20 25,25 M35,25 Q30,20 35,15 Q40,20 35,25" fill="currentColor" opacity="0.1"/>
        <path d="M65,75 Q60,70 65,65 Q70,70 65,75 M75,75 Q70,70 75,65 Q80,70 75,75" fill="currentColor" opacity="0.1"/>
        
        <!-- Small dots -->
        <circle cx="15" cy="15" r="0.5" fill="currentColor" opacity="0.3"/>
        <circle cx="85" cy="85" r="0.5" fill="currentColor" opacity="0.3"/>
        <circle cx="15" cy="85" r="0.5" fill="currentColor" opacity="0.3"/>
        <circle cx="85" cy="15" r="0.5" fill="currentColor" opacity="0.3"/>
        <circle cx="50" cy="50" r="0.5" fill="currentColor" opacity="0.3"/>
      </g>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#testimonialPattern)"/>
</svg>