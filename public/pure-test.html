<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-red { color: red; font-size: 48px; font-weight: bold; }
        .custom-box { background-color: #10b981; color: white; padding: 20px; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="custom-red">✅ If this is RED, basic CSS works!</h1>
        
        <div class="custom-box">
            ✅ If this is GREEN with white text, custom CSS works!
        </div>
        
        <div class="bg-blue-500 text-white p-6 rounded-lg mt-4">
            ✅ If this has a BLUE background, Tailwind CDN works!
        </div>
        
        <div class="grid grid-cols-3 gap-4 mt-6">
            <div class="bg-purple-500 text-white p-4 rounded shadow-lg">Purple</div>
            <div class="bg-yellow-500 text-black p-4 rounded shadow-lg">Yellow</div>
            <div class="bg-pink-500 text-white p-4 rounded shadow-lg">Pink</div>
        </div>
        
        <button class="mt-6 px-6 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg shadow-lg transform transition hover:scale-105">
            Hover Me - I should scale up
        </button>
        
        <p class="mt-8 text-xl text-gray-700">
            If you see all the styled elements above, CSS is working perfectly! 🎉
        </p>
    </div>
</body>
</html>
