openapi: 3.0.3
info:
  title: Taxomind LMS API
  description: |
    Comprehensive API documentation for Taxomind Learning Management System.
    
    ## Overview
    Taxomind is an intelligent LMS featuring AI-powered adaptive learning, real-time analytics, 
    and enterprise-grade security. The API supports multiple learning paths with role-based access 
    control for students, teachers, and administrators.
    
    ## Authentication
    All authenticated endpoints require a Bearer token in the Authorization header.
    Use the `/api/auth/login` endpoint to obtain a token.
    
    ## Rate Limiting
    API endpoints are rate-limited to prevent abuse:
    - Anonymous: 10 requests per minute
    - Authenticated: 100 requests per minute
    - Premium: 1000 requests per minute
    
  version: 1.0.0
  contact:
    name: Taxomind Support
    email: support@taxomind.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://staging.taxomind.com
    description: Staging server
  - url: https://api.taxomind.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Courses
    description: Course management and browsing
  - name: Enrollment
    description: Course enrollment and purchases
  - name: Progress
    description: Learning progress tracking
  - name: Content
    description: Course content and materials
  - name: Analytics
    description: Learning analytics and insights
  - name: Users
    description: User profile and settings
  - name: Admin
    description: Administrative operations
  - name: AI
    description: AI-powered features

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
        details:
          type: object
          description: Additional error details
        statusCode:
          type: integer
          description: HTTP status code

    Success:
      type: object
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data:
          type: object

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        image:
          type: string
          format: uri
        emailVerified:
          type: string
          format: date-time
        isTwoFactorEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        imageUrl:
          type: string
          format: uri
        price:
          type: number
          format: float
          minimum: 0
        level:
          type: string
          enum: [BEGINNER, INTERMEDIATE, ADVANCED]
        categoryId:
          type: string
        isPublished:
          type: boolean
        userId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        category:
          $ref: '#/components/schemas/Category'
        user:
          $ref: '#/components/schemas/User'
        _count:
          type: object
          properties:
            chapters:
              type: integer
            Enrollment:
              type: integer
            reviews:
              type: integer

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string

    Chapter:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        position:
          type: integer
        isPublished:
          type: boolean
        isFree:
          type: boolean
        courseId:
          type: string
        sections:
          type: array
          items:
            $ref: '#/components/schemas/Section'

    Section:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        content:
          type: string
        videoUrl:
          type: string
        duration:
          type: integer
        position:
          type: integer
        chapterId:
          type: string
        isPublished:
          type: boolean

    Enrollment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
        courseId:
          type: string
        progress:
          type: number
          minimum: 0
          maximum: 100
        enrolledAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    Progress:
      type: object
      properties:
        userId:
          type: string
        sectionId:
          type: string
        isCompleted:
          type: boolean
        completedAt:
          type: string
          format: date-time

    Purchase:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
        courseId:
          type: string
        amount:
          type: number
          format: float
        createdAt:
          type: string
          format: date-time

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        hasMore:
          type: boolean

paths:
  # ===== Authentication Endpoints =====
  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with email verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]'
                name:
                  type: string
                  minLength: 2
                  maxLength: 50
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: string
                    example: "Confirmation email sent!"
        '400':
          description: Invalid input or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: Authenticate user and receive access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                code:
                  type: string
                  description: 2FA code if enabled
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: string
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '202':
          description: 2FA required
          content:
            application/json:
              schema:
                type: object
                properties:
                  twoFactor:
                    type: boolean
                    example: true

  /api/auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Invalidate current session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful

  /api/auth/verify-email:
    post:
      tags:
        - Authentication
      summary: Verify email address
      description: Verify email using token sent to email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Email verified successfully
        '400':
          description: Invalid or expired token

  /api/auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: Send password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent

  # ===== Course Endpoints =====
  /api/courses:
    get:
      tags:
        - Courses
      summary: List all courses
      description: Get paginated list of published courses with optional filters
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
            enum: [BEGINNER, INTERMEDIATE, ADVANCED]
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: sort
          in: query
          schema:
            type: string
            enum: [title, price, createdAt, rating]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: List of courses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Course'

    post:
      tags:
        - Courses
      summary: Create a new course
      description: Create a new course (requires teacher role)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
                - categoryId
              properties:
                title:
                  type: string
                  minLength: 3
                  maxLength: 100
                description:
                  type: string
                  maxLength: 1000
                imageUrl:
                  type: string
                  format: uri
                price:
                  type: number
                  minimum: 0
                level:
                  type: string
                  enum: [BEGINNER, INTERMEDIATE, ADVANCED]
                categoryId:
                  type: string
      responses:
        '201':
          description: Course created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - requires teacher role

  /api/courses/{courseId}:
    get:
      tags:
        - Courses
      summary: Get course details
      description: Get detailed information about a specific course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Course details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '404':
          description: Course not found

    put:
      tags:
        - Courses
      summary: Update course
      description: Update course details (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                imageUrl:
                  type: string
                price:
                  type: number
                level:
                  type: string
                  enum: [BEGINNER, INTERMEDIATE, ADVANCED]
                isPublished:
                  type: boolean
      responses:
        '200':
          description: Course updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '403':
          description: Forbidden - not course owner
        '404':
          description: Course not found

    delete:
      tags:
        - Courses
      summary: Delete course
      description: Delete a course (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Course deleted
        '403':
          description: Forbidden - not course owner
        '404':
          description: Course not found

  /api/courses/{courseId}/chapters:
    get:
      tags:
        - Content
      summary: Get course chapters
      description: Get all chapters for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of chapters
          content:
            application/json:
              schema:
                type: object
                properties:
                  chapters:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chapter'

    post:
      tags:
        - Content
      summary: Create chapter
      description: Add a new chapter to course
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                description:
                  type: string
                position:
                  type: integer
                isFree:
                  type: boolean
      responses:
        '201':
          description: Chapter created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chapter'

  # ===== Enrollment & Purchase Endpoints =====
  /api/purchase:
    post:
      tags:
        - Enrollment
      summary: Purchase a course
      description: Create a purchase record for a course
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - courseId
              properties:
                courseId:
                  type: string
                paymentMethodId:
                  type: string
                  description: Stripe payment method ID
      responses:
        '201':
          description: Purchase successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Purchase'
        '400':
          description: Already purchased or invalid course
        '402':
          description: Payment required

  /api/enrollment:
    post:
      tags:
        - Enrollment
      summary: Enroll in a course
      description: Create enrollment after purchase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - courseId
              properties:
                courseId:
                  type: string
      responses:
        '201':
          description: Enrollment successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '403':
          description: Purchase required
        '409':
          description: Already enrolled

  /api/user/enrollments:
    get:
      tags:
        - Enrollment
      summary: Get user enrollments
      description: List all courses user is enrolled in
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Enrollment'

  # ===== Progress Endpoints =====
  /api/progress:
    get:
      tags:
        - Progress
      summary: Get learning progress
      description: Get user's progress for enrolled courses
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: query
          schema:
            type: string
          description: Filter by specific course
      responses:
        '200':
          description: Progress data
          content:
            application/json:
              schema:
                type: object
                properties:
                  progress:
                    type: array
                    items:
                      $ref: '#/components/schemas/Progress'
                  completionRate:
                    type: number

  /api/progress/update:
    post:
      tags:
        - Progress
      summary: Update progress
      description: Mark a section as completed
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sectionId
                - isCompleted
              properties:
                sectionId:
                  type: string
                isCompleted:
                  type: boolean
      responses:
        '200':
          description: Progress updated
        '403':
          description: Not enrolled in course

  # ===== Analytics Endpoints =====
  /api/analytics/learning:
    get:
      tags:
        - Analytics
      summary: Get learning analytics
      description: Get personalized learning analytics
      security:
        - bearerAuth: []
      parameters:
        - name: timeframe
          in: query
          schema:
            type: string
            enum: [week, month, quarter, year]
            default: month
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  studyTime:
                    type: integer
                    description: Total study time in minutes
                  coursesCompleted:
                    type: integer
                  averageScore:
                    type: number
                  learningStreak:
                    type: integer
                  achievements:
                    type: array
                    items:
                      type: object

  /api/teacher-analytics/course-overview:
    post:
      tags:
        - Analytics
      summary: Get course analytics (Teacher)
      description: Get detailed analytics for a course
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - courseId
              properties:
                courseId:
                  type: string
                timeframe:
                  type: string
                  enum: [week, month, semester, all]
      responses:
        '200':
          description: Course analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalStudents:
                    type: integer
                  averageProgress:
                    type: number
                  completionRate:
                    type: number
                  engagementMetrics:
                    type: object

  /api/teacher-analytics/student-profile:
    post:
      tags:
        - Analytics
      summary: Get student analytics (Teacher)
      description: Get detailed analytics for a specific student
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - courseId
                - studentId
              properties:
                courseId:
                  type: string
                studentId:
                  type: string
                timeframe:
                  type: string
                  enum: [week, month, semester, all]
      responses:
        '200':
          description: Student analytics profile

  # ===== AI Endpoints =====
  /api/courses/generate-blueprint:
    post:
      tags:
        - AI
      summary: Generate course blueprint with AI
      description: Use AI to generate a course structure
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
              properties:
                title:
                  type: string
                description:
                  type: string
                targetAudience:
                  type: string
                objectives:
                  type: array
                  items:
                    type: string
                duration:
                  type: string
                  enum: [short, medium, long]
      responses:
        '200':
          description: Generated course blueprint
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                  description:
                    type: string
                  chapters:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        description:
                          type: string
                        sections:
                          type: array
                          items:
                            type: object

  /api/sam/ai-tutor/socratic:
    post:
      tags:
        - AI
      summary: Socratic tutoring
      description: AI-powered Socratic method tutoring
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question
                - context
              properties:
                question:
                  type: string
                context:
                  type: object
                  properties:
                    courseId:
                      type: string
                    chapterId:
                      type: string
                    topic:
                      type: string
      responses:
        '200':
          description: AI tutor response
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                  guidingQuestions:
                    type: array
                    items:
                      type: string
                  hints:
                    type: array
                    items:
                      type: string

  # ===== User Management Endpoints =====
  /api/users/profile:
    get:
      tags:
        - Users
      summary: Get user profile
      description: Get current user's profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    put:
      tags:
        - Users
      summary: Update profile
      description: Update user profile information
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                bio:
                  type: string
                avatar:
                  type: string
                  format: uri
                preferences:
                  type: object
      responses:
        '200':
          description: Profile updated

  /api/users/settings:
    get:
      tags:
        - Users
      summary: Get user settings
      description: Get user account settings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User settings

    put:
      tags:
        - Users
      summary: Update settings
      description: Update user account settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emailNotifications:
                  type: boolean
                isTwoFactorEnabled:
                  type: boolean
                theme:
                  type: string
                  enum: [light, dark, system]
                language:
                  type: string
      responses:
        '200':
          description: Settings updated

  # ===== Admin Endpoints =====
  /api/admin/users:
    get:
      tags:
        - Admin
      summary: List all users (Admin)
      description: Get list of all users in the system
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
            enum: [USER, ADMIN]
      responses:
        '200':
          description: List of users
        '403':
          description: Requires admin role

  /api/admin/users/{userId}:
    put:
      tags:
        - Admin
      summary: Update user (Admin)
      description: Update user details and roles
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [USER, ADMIN]
                isActive:
                  type: boolean
                emailVerified:
                  type: boolean
      responses:
        '200':
          description: User updated
        '403':
          description: Requires admin role

    delete:
      tags:
        - Admin
      summary: Delete user (Admin)
      description: Delete a user account
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted
        '403':
          description: Requires admin role

  /api/admin/analytics:
    get:
      tags:
        - Admin
      summary: Platform analytics (Admin)
      description: Get platform-wide analytics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Platform analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalUsers:
                    type: integer
                  totalCourses:
                    type: integer
                  totalRevenue:
