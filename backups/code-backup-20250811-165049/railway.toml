[build]
builder = "nixpacks"

[deploy]
startCommand = "npm run start:production"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[env]
NODE_ENV = "production"

# Railway will auto-inject DATABASE_URL and REDIS_URL from services
# These are just documentation of what we expect
# DATABASE_URL = "postgresql://..."  # Auto-injected by Railway PostgreSQL service
# REDIS_URL = "redis://..."          # Auto-injected by Railway Redis service