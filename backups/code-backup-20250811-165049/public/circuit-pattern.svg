<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="circuit" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3">
        <!-- Horizontal lines -->
        <line x1="10" y1="15" x2="50" y2="15"/>
        <line x1="10" y1="30" x2="50" y2="30"/>
        <line x1="10" y1="45" x2="50" y2="45"/>
        
        <!-- Vertical lines -->
        <line x1="15" y1="10" x2="15" y2="50"/>
        <line x1="30" y1="10" x2="30" y2="50"/>
        <line x1="45" y1="10" x2="45" y2="50"/>
        
        <!-- Connection nodes -->
        <circle cx="15" cy="15" r="1" fill="currentColor"/>
        <circle cx="30" cy="15" r="1" fill="currentColor"/>
        <circle cx="45" cy="15" r="1" fill="currentColor"/>
        <circle cx="15" cy="30" r="1" fill="currentColor"/>
        <circle cx="30" cy="30" r="1" fill="currentColor"/>
        <circle cx="45" cy="30" r="1" fill="currentColor"/>
        <circle cx="15" cy="45" r="1" fill="currentColor"/>
        <circle cx="30" cy="45" r="1" fill="currentColor"/>
        <circle cx="45" cy="45" r="1" fill="currentColor"/>
        
        <!-- Small connectors -->
        <rect x="14" y="14" width="2" height="2" fill="currentColor" opacity="0.6"/>
        <rect x="29" y="29" width="2" height="2" fill="currentColor" opacity="0.6"/>
        <rect x="44" y="44" width="2" height="2" fill="currentColor" opacity="0.6"/>
      </g>
    </pattern>
  </defs>
  <rect width="60" height="60" fill="url(#circuit)"/>
</svg>