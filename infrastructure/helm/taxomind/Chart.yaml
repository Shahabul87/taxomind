apiVersion: v2
name: taxomind
description: Helm chart for Taxomind LMS - Enterprise Learning Management System
type: application
version: 1.0.0
appVersion: "1.0.0"
home: https://taxomind.com
sources:
  - https://github.com/yourusername/taxomind
maintainers:
  - name: Taxomind DevOps Team
    email: devops@taxomind.com
keywords:
  - lms
  - learning-management-system
  - education
  - nextjs
  - kubernetes
dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "18.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: ingress-nginx
    version: "4.x.x"
    repository: https://kubernetes.github.io/ingress-nginx
    condition: ingress-nginx.enabled