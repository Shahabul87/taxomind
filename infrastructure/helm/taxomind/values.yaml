# Default values for Taxomind LMS Helm Chart

# Global configuration
global:
  environment: development
  domain: taxomind.local
  imageRegistry: ""
  imagePullSecrets: []
  
# Application configuration
app:
  name: taxomind
  replicaCount: 3
  
  image:
    repository: taxomind/lms
    tag: latest
    pullPolicy: IfNotPresent
  
  # Resource limits and requests
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 500m
      memory: 512Mi
  
  # Autoscaling configuration
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  # Service configuration
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
    annotations: {}
  
  # Health checks
  livenessProbe:
    enabled: true
    path: /api/health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    enabled: true
    path: /api/ready
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  
  # Environment variables
  env:
    - name: NODE_ENV
      value: production
    - name: NEXT_PUBLIC_APP_URL
      value: https://taxomind.com
  
  # Secrets (will be created from external secrets)
  secretEnv:
    - name: DATABASE_URL
      secretName: taxomind-secrets
      key: database-url
    - name: NEXTAUTH_SECRET
      secretName: taxomind-secrets
      key: nextauth-secret
    - name: REDIS_URL
      secretName: taxomind-secrets
      key: redis-url
    - name: OPENAI_API_KEY
      secretName: taxomind-secrets
      key: openai-api-key
    - name: ANTHROPIC_API_KEY
      secretName: taxomind-secrets
      key: anthropic-api-key

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: taxomind.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: taxomind-tls
      hosts:
        - taxomind.com
        - www.taxomind.com

# PostgreSQL subchart configuration
postgresql:
  enabled: false  # We use external RDS in production
  auth:
    database: taxomind
    username: taxomind_user
    existingSecret: taxomind-db-secret
  persistence:
    enabled: true
    size: 10Gi
  metrics:
    enabled: true

# Redis subchart configuration
redis:
  enabled: false  # We use external ElastiCache in production
  auth:
    enabled: true
    existingSecret: taxomind-redis-secret
  master:
    persistence:
      enabled: true
      size: 8Gi
  replica:
    replicaCount: 2
    persistence:
      enabled: true
      size: 8Gi
  metrics:
    enabled: true

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: taxomind-sa

# Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Network Policy
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  maxUnavailable: 1

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /metrics
  prometheusRule:
    enabled: true
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High error rate detected
      - alert: HighResponseTime
        expr: http_request_duration_seconds{quantile="0.95"} > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High response time detected

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"
  retention: 30

# Blue-Green Deployment
blueGreen:
  enabled: false
  productionSlot: blue
  stagingSlot: green

# Rollback configuration
rollback:
  enabled: true
  revisionHistoryLimit: 10
  automaticRollback:
    enabled: true
    failureThreshold: 0.1
    monitoringDuration: 300

# Job for database migrations
migrations:
  enabled: true
  backoffLimit: 3
  activeDeadlineSeconds: 600
  image:
    repository: taxomind/migrations
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

# CronJob for scheduled tasks
cronJobs:
  cleanup:
    enabled: true
    schedule: "0 3 * * *"
    command: ["npm", "run", "cleanup:old-data"]
  analytics:
    enabled: true
    schedule: "*/30 * * * *"
    command: ["npm", "run", "analytics:generate"]
  backup:
    enabled: true
    schedule: "0 4 * * *"
    command: ["npm", "run", "backup:database"]

# ConfigMaps
configMaps:
  app-config:
    data:
      max_upload_size: "50M"
      session_timeout: "3600"
      rate_limit: "100"
      
# Persistent Volume Claims
persistence:
  enabled: true
  storageClass: gp3
  accessMode: ReadWriteOnce
  size: 20Gi
  mountPath: /data

# Node Affinity
nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - taxomind
          topologyKey: kubernetes.io/hostname