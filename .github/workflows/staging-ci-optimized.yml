name: 🚀 Optimized Staging CI/CD Pipeline

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]

env:
  NODE_VERSION: '18.x'
  DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
  NEXTAUTH_SECRET: ${{ secrets.STAGING_NEXTAUTH_SECRET }}
  NEXTAUTH_URL: ${{ secrets.STAGING_NEXTAUTH_URL }}

jobs:
  # 🔍 Code Quality (Parallel with Testing)
  code-quality:
    name: 📊 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📚 Install Dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: 🔍 Lint Check
        run: NODE_OPTIONS='--max-old-space-size=8192' npm run lint -- --max-warnings=0
        
      - name: 🎯 TypeScript Check
        run: |
          NODE_OPTIONS='--max-old-space-size=8192' \
          npx tsc --noEmit --skipLibCheck --incremental false
        continue-on-error: true

  # 🧪 Optimized Testing with Chunking
  test-chunk:
    name: 🧪 Test Chunk ${{ matrix.chunk }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        chunk: [1, 2, 3, 4]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📚 Install Dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: 🗄️ Database Setup
        run: |
          npx prisma generate
          npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test_db
          
      - name: 🧪 Run Test Chunk
        run: |
          # Set memory limits
          export NODE_OPTIONS="--max-old-space-size=2048"
          
          # Find test files and split into chunks
          TEST_FILES=$(find . -path ./node_modules -prune -o \
            -path ./.next -prune -o \
            -path ./e2e -prune -o \
            -type f \( -name "*.test.ts" -o -name "*.test.tsx" \) -print | \
            grep -v ".performance." | \
            grep -v ".stress." | \
            sort)
          
          # Calculate chunk
          TOTAL_FILES=$(echo "$TEST_FILES" | wc -l)
          CHUNK_SIZE=$((($TOTAL_FILES + 3) / 4))
          START=$(( (${{ matrix.chunk }} - 1) * $CHUNK_SIZE + 1 ))
          END=$(( ${{ matrix.chunk }} * $CHUNK_SIZE ))
          
          # Get files for this chunk
          CHUNK_FILES=$(echo "$TEST_FILES" | sed -n "${START},${END}p" | tr '\n' ' ')
          
          if [ -n "$CHUNK_FILES" ]; then
            echo "Running chunk ${{ matrix.chunk }} with $(echo $CHUNK_FILES | wc -w) files"
            npx jest \
              --config=jest.config.ci.js \
              --runInBand \
              --no-cache \
              --testTimeout=30000 \
              --forceExit \
              $CHUNK_FILES
          else
            echo "No test files in chunk ${{ matrix.chunk }}"
          fi
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test_db
          CI: true
          NODE_ENV: test

  # 🏗️ Optimized Build
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [code-quality]
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📚 Install Production Dependencies
        run: |
          npm ci --prefer-offline --no-audit --production=false
          
      - name: 🔧 Prisma Generate
        run: npx prisma generate
        
      - name: 🏗️ Fast Build
        run: |
          # Use swc for faster builds
          export NEXT_TELEMETRY_DISABLED=1
          export NODE_OPTIONS="--max-old-space-size=3072"
          
          # Build with optimizations
          npx next build --experimental-build-mode=compile
        env:
          NODE_ENV: production
          SKIP_ENV_VALIDATION: true

  # Final status check
  status-check:
    name: ✅ Status Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [code-quality, test-chunk, build]
    if: always()
    steps:
      - name: Check Job Status
        run: |
          if [[ "${{ needs.code-quality.result }}" == "failure" || \
                "${{ needs.test-chunk.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ One or more jobs failed"
            exit 1
          else
            echo "✅ All jobs completed successfully"
          fi