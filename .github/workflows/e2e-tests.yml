name: E2E Tests

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - auth
          - courses
          - performance
          - visual
          - accessibility

env:
  NODE_VERSION: '22.x'
  PNPM_VERSION: '9'
  PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
  DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

jobs:
  # Setup job to prepare test environment
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Generate cache key
        id: cache-key
        run: echo "key=${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        id: cache
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Build application
        run: pnpm run build
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://test_user:test_pass@localhost:5432/test_db' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-test-key-for-build-only' }}
          AUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'test-secret-for-build-only-32-chars' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'test-secret-for-build-only-32-chars' }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          NEXT_PUBLIC_API_URL: ${{ secrets.TEST_API_URL || 'http://localhost:3000/api' }}
          NODE_ENV: production
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            .next
            public
          retention-days: 1

  # E2E test job - runs tests in parallel
  e2e-tests:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        browser: [chromium, firefox, webkit]
    name: E2E Tests (Shard ${{ matrix.shard }}/${{ strategy.job-total }} - ${{ matrix.browser }})
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Setup test database
        run: |
          pnpm run test:db:setup
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Start application
        run: |
          pnpm run start &
          pnpm exec wait-on http://localhost:3000
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Run E2E tests
        run: |
          pnpm exec playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
      
      - name: Upload coverage
        if: matrix.shard == 1 && matrix.browser == 'chromium'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}

  # Performance testing job
  performance-tests:
    needs: setup
    runs-on: ubuntu-latest
    name: Performance Tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Start application
        run: |
          pnpm run start &
          pnpm exec wait-on http://localhost:3000
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Run Lighthouse CI
        run: |
          pnpm add -g @lhci/cli
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Run performance tests
        run: pnpm exec playwright test e2e/tests/performance.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            .lighthouseci/
            test-results/performance/
          retention-days: 30
      
      - name: Comment PR with performance results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('./test-results/performance/metrics.json', 'utf8'));
            
            const comment = `## 🚀 Performance Test Results
            
            | Metric | Value | Status |
            |--------|-------|--------|
            | LCP | ${results.lcp}ms | ${results.lcp < 2500 ? '✅' : '⚠️'} |
            | FID | ${results.fid}ms | ${results.fid < 100 ? '✅' : '⚠️'} |
            | CLS | ${results.cls} | ${results.cls < 0.1 ? '✅' : '⚠️'} |
            | FCP | ${results.fcp}ms | ${results.fcp < 1800 ? '✅' : '⚠️'} |
            | TTI | ${results.tti}ms | ${results.tti < 3800 ? '✅' : '⚠️'} |
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Visual regression testing job
  visual-tests:
    needs: setup
    runs-on: ubuntu-latest
    name: Visual Regression Tests
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Start application
        run: |
          pnpm run start &
          pnpm exec wait-on http://localhost:3000
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Run visual regression tests
        run: pnpm exec percy exec -- pnpm exec playwright test e2e/visual-regression
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      
      - name: Upload visual diff results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-results
          path: test-results/visual/
          retention-days: 7

  # Accessibility testing job
  accessibility-tests:
    needs: setup
    runs-on: ubuntu-latest
    name: Accessibility Tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Start application
        run: |
          pnpm run start &
          pnpm exec wait-on http://localhost:3000
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Run accessibility tests
        run: pnpm exec playwright test --grep @accessibility
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Generate accessibility report
        if: always()
        run: |
          pnpm run test:accessibility:report
      
      - name: Upload accessibility results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-results
          path: |
            test-results/accessibility/
            accessibility-report.html
          retention-days: 30

  # Test report generation
  test-report:
    needs: [e2e-tests, performance-tests, visual-tests, accessibility-tests]
    runs-on: ubuntu-latest
    if: always()
    name: Generate Test Report
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true
          path: all-results/
      
      - name: Merge test results
        run: |
          pnpm add --save-dev @playwright/test
          pnpm exec playwright merge-reports --reporter html ./all-results
      
      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      
      - name: Deploy report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: e2e-reports/${{ github.run_number }}
      
      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('./all-results/summary.json', 'utf8'));
            
            const comment = `## 🧪 E2E Test Results
            
            **Total Tests:** ${summary.total}
            **Passed:** ✅ ${summary.passed}
            **Failed:** ❌ ${summary.failed}
            **Skipped:** ⏭️ ${summary.skipped}
            **Duration:** ⏱️ ${summary.duration}ms
            
            [View Full Report](https://your-domain.github.io/e2e-reports/${{ github.run_number }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Cleanup job
  cleanup:
    needs: test-report
    runs-on: ubuntu-latest
    if: always()
    name: Cleanup
    
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const oldArtifacts = artifacts.data.artifacts.filter(artifact => {
              const createdAt = new Date(artifact.created_at);
              const now = new Date();
              const diffDays = (now - createdAt) / (1000 * 60 * 60 * 24);
              return diffDays > 7;
            });
            
            for (const artifact of oldArtifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }