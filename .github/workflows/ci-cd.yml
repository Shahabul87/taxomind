name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://test:test@localhost:5432/test_db

jobs:
  # Code Quality Checks
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        
      - name: Check TypeScript
        run: npx tsc --noEmit

  # Unit and Integration Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    timeout-minutes: 15  # Add overall job timeout
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js with memory limits
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          
      - name: Set Node Options
        run: |
          echo "NODE_OPTIONS=--max-old-space-size=2048" >> $GITHUB_ENV
          
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Run database migrations
        run: npx prisma db push
        timeout-minutes: 2
        
      - name: Run optimized tests
        run: npm run test:ci:optimized
        timeout-minutes: 10
        env:
          CI: true
          NODE_ENV: test
          SKIP_COVERAGE: true
        
      - name: Upload test results if failed
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            jest-results.json
            coverage/
          retention-days: 3

  # Build Verification
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20  # Add overall job timeout
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js with memory limits
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          
      - name: Set Node Options for Build
        run: |
          echo "NODE_OPTIONS=--max-old-space-size=4096" >> $GITHUB_ENV
          
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: Create .env file for build
        run: |
          echo "DATABASE_URL=${{ env.DATABASE_URL }}" > .env
          echo "NEXTAUTH_URL=http://localhost:3000" >> .env
          echo "AUTH_SECRET=test_secret_key_for_ci_only" >> .env
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env
        
      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Build Next.js application with CI optimizations
        run: npm run build:ci
        timeout-minutes: 15
        env:
          SKIP_ENV_VALIDATION: true
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-files
          path: .next/
          retention-days: 1

  # Security Scanning
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run npm audit
        run: npm audit --production --audit-level=high
        continue-on-error: true
        
      - name: Run security scan with Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # Deploy to Railway (Production)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          service: taxomind
          
      - name: Notify deployment status
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # Deploy to Railway (Staging - from dev branch)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test, build]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to Railway Staging
        uses: bervProject/railway-deploy@main
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
        with:
          service: taxomind-staging
          
      - name: Notify deployment status
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true