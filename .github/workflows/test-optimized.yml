name: 🧪 Optimized Test Suite

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  DATABASE_URL: postgresql://test:test@localhost:5432/test_db
  NODE_ENV: test
  CI: true

jobs:
  # Quick syntax and type checks before running tests
  pre-check:
    name: 🔍 Pre-checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit
      - run: NODE_OPTIONS='--max-old-space-size=8192' npm run lint -- --max-warnings=0
      - run: npx tsc --noEmit --skipLibCheck

  # Lightweight unit tests
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: pre-check
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      
      - name: Generate Prisma Client
        run: npx prisma generate
      
      - name: Run unit tests with memory limits
        run: |
          NODE_OPTIONS='--max-old-space-size=1536' \
          npm run test:ci:optimized
        env:
          SKIP_COVERAGE: true
          TEST_TIMEOUT: 30000
      
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: unit-test-results
          path: |
            test-results/
            jest-results.json
          retention-days: 3

  # Database-dependent tests (run separately)
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: pre-check
    timeout-minutes: 15
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      
      - name: Setup database
        run: |
          npx prisma generate
          npx prisma db push --skip-generate
        timeout-minutes: 3
      
      - name: Run integration tests
        run: |
          NODE_OPTIONS='--max-old-space-size=2048' \
          jest --config jest.config.ci.js \
               --testNamePattern="(integration|api|database)" \
               --ci \
               --maxWorkers=2 \
               --bail
        timeout-minutes: 10
        continue-on-error: true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: integration-test-results
          path: |
            test-results/
            coverage/
          retention-days: 3

  # Build verification (parallel with tests)
  build-check:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: pre-check
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      
      - name: Create minimal .env
        run: |
          echo "DATABASE_URL=${{ env.DATABASE_URL }}" > .env
          echo "NEXTAUTH_URL=http://localhost:3000" >> .env
          echo "AUTH_SECRET=test_secret" >> .env
      
      - name: Generate Prisma Client
        run: npx prisma generate
      
      - name: Build with memory limits
        run: |
          NODE_OPTIONS='--max-old-space-size=3072' \
          npm run build:ci
        timeout-minutes: 12
        env:
          SKIP_ENV_VALIDATION: true
          NEXT_TELEMETRY_DISABLED: 1
      
      - name: Check build output
        run: |
          if [ -d ".next" ]; then
            echo "✅ Build successful"
            du -sh .next
          else
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi

  # Final status check
  test-status:
    name: ✅ Test Suite Status
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, build-check]
    if: always()
    timeout-minutes: 2
    
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.unit-tests.result }}" == "failure" ] || \
             [ "${{ needs.build-check.result }}" == "failure" ]; then
            echo "❌ Critical tests failed"
            exit 1
          fi
          
          if [ "${{ needs.integration-tests.result }}" == "failure" ]; then
            echo "⚠️ Integration tests failed (non-blocking)"
          fi
          
          echo "✅ Test suite completed successfully"

# Concurrency settings to prevent multiple runs
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true