groups:
  - name: lms_alerts
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: rate(api_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second"

      # High response time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s"

      # Database connection issues
      - alert: DatabaseDown
        expr: up{job="taxomind-lms"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "LMS application is down"
          description: "The LMS application has been down for more than 1 minute"

      # Low enrollment rate (example business metric)
      - alert: LowEnrollmentRate
        expr: rate(course_enrollments_total[1h]) < 0.01
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Low course enrollment rate"
          description: "Course enrollment rate is {{ $value }} per second"

      # High memory usage
      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}MB"

      # Too many failed authentication attempts
      - alert: HighAuthFailureRate
        expr: rate(authentication_attempts_total{result="failure"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High authentication failure rate"
          description: "Authentication failure rate is {{ $value }} per second"

  - name: system_alerts
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: process_cpu_seconds_total > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80%"

      # Redis down
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 1 minute"